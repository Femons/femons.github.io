<style>
    /* === NAV CSS === */
    nav{background:#001621;position:sticky;top:0;z-index:1000;box-shadow:0 2px 16px rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.06);}
    .nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;height:68px;display:flex;align-items:center;gap:0;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:40px;flex-shrink:0;}
    .logo-icon{width:38px;height:38px;background:#FF4103;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:17px;}
    .logo-text{color:#fff;font-weight:800;font-size:17px;letter-spacing:-.3px;}
    .logo-text span{color:#FF4103;}
    .nav-links{display:flex;align-items:center;gap:2px;list-style:none;flex:1;}
    .nav-links a{color:rgba(255,255,255,.65);text-decoration:none;font-size:14px;font-weight:500;padding:7px 13px;border-radius:7px;transition:color .18s,background .18s;white-space:nowrap;}
    .nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.09);}
    .nav-cta{background:#FF4103!important;color:#fff!important;font-weight:700!important;padding:9px 20px!important;border-radius:8px!important;margin-left:8px!important;}
    .nav-cta:hover{background:#e03800!important;}
    .nav-phone{color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;margin-left:20px;white-space:nowrap;flex-shrink:0;}
    .nav-phone:hover{color:#fff;}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;margin-left:12px;}
    .hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;transition:all .3s;}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .mobile-nav{display:none;position:fixed;top:68px;left:0;right:0;bottom:0;background:#001621;z-index:999;padding:24px 20px;flex-direction:column;gap:4px;overflow-y:auto;}
    .mobile-nav.open{display:flex;}
    .mobile-nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:17px;font-weight:600;padding:14px 18px;border-radius:10px;border-bottom:1px solid rgba(255,255,255,.05);transition:background .2s;}
    .mobile-nav a:hover{color:#fff;background:rgba(255,65,3,.15);}
    .mobile-nav .mob-cta{background:#FF4103!important;color:#fff!important;text-align:center;margin-top:12px;border-radius:10px!important;border-bottom:none!important;}
    @media(max-width:960px){.nav-links{display:none!important;}.nav-phone{display:none!important;}.hamburger{display:flex!important;}.nav-inner{padding:0 20px!important;}}
    /* === / NAV CSS === */

  :root{--orange:#FF4103;--dark:#001621;--dark2:#00243a;--white:#ffffff;--gray-light:#f4f6f8;--gray-mid:#e2e8ed;--gray-text:#6b7a8a;--font:'Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}body{font-family:var(--font);background:var(--white);color:var(--dark);font-size:15px;line-height:1.6;}
  nav{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
  .nav-inner{max-width:1160px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-icon{width:36px;height:36px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;}
  .logo-text{color:#fff;font-weight:700;font-size:17px;}.logo-text span{color:var(--orange);}
  .nav-links{display:flex;align-items:center;gap:4px;list-style:none;}.nav-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;font-weight:500;padding:6px 12px;border-radius:6px;transition:color .2s,background .2s;}.nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.08);}
  .nav-cta{background:var(--orange)!important;color:#fff!important;font-weight:600!important;padding:8px 18px!important;border-radius:8px!important;}
  .nav-phone{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;}.hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;transition:all .3s;}
  .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}.hamburger.open span:nth-child(2){opacity:0;}.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
  .mobile-nav{display:none;position:fixed;top:64px;left:0;right:0;bottom:0;background:var(--dark);z-index:99;padding:24px;flex-direction:column;gap:8px;}.mobile-nav.open{display:flex;}
  .mobile-nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:18px;font-weight:600;padding:14px 16px;border-radius:10px;border-bottom:1px solid rgba(255,255,255,.06);}
  .mobile-nav a:hover,.mobile-nav a.active{color:#fff;background:rgba(255,65,3,.15);}.mobile-nav .mob-cta{background:var(--orange);color:#fff!important;text-align:center;margin-top:8px;border-radius:10px!important;border-bottom:none!important;}
  @media(max-width:900px){.nav-links{display:none;}.hamburger{display:flex;}.nav-phone{display:none;}}
  .hero{background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%);padding:64px 24px 56px;position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 40%,rgba(255,65,3,.13) 0%,transparent 55%);}
  .hero-inner{max-width:1160px;margin:0 auto;position:relative;}
  .hero-eyebrow{display:inline-block;background:rgba(255,65,3,.15);color:var(--orange);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:5px 16px;border-radius:20px;margin-bottom:18px;border:1px solid rgba(255,65,3,.3);}
  .hero h1{color:#fff;font-size:clamp(26px,4vw,44px);font-weight:800;line-height:1.2;margin-bottom:14px;max-width:640px;}
  .hero p{color:rgba(255,255,255,.65);font-size:16px;max-width:560px;}
  .section{padding:72px 24px;}.section-alt{background:var(--gray-light);}.section-dark{background:var(--dark);}
  .section-inner{max-width:1160px;margin:0 auto;}
  .section-eyebrow{display:inline-block;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:12px;}
  .section-title{font-size:clamp(22px,3vw,34px);font-weight:800;line-height:1.2;margin-bottom:14px;}
  .section-title-white{color:#fff;}.section-lead{color:var(--gray-text);font-size:16px;max-width:640px;line-height:1.75;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;margin-top:40px;}
  .about-text p{font-size:15px;color:var(--gray-text);line-height:1.8;margin-bottom:16px;}
  .about-text p:last-child{margin-bottom:0;}
  .about-text strong{color:var(--dark);}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .stat-box{background:#fff;border:1px solid var(--gray-mid);border-radius:14px;padding:24px;text-align:center;}
  .stat-box .num{font-size:36px;font-weight:900;color:var(--orange);line-height:1;}
  .stat-box .lbl{font-size:13px;color:var(--gray-text);margin-top:6px;}
  .values-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-top:40px;}
  .value-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:24px;transition:background .2s;}
  .value-card:hover{background:rgba(255,65,3,.1);border-color:rgba(255,65,3,.25);}
  .value-icon{font-size:28px;margin-bottom:14px;}
  .value-card h3{color:#fff;font-size:16px;font-weight:700;margin-bottom:8px;}
  .value-card p{color:rgba(255,255,255,.55);font-size:13px;line-height:1.65;}
  .offices{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:40px;}
  .office-card{background:#fff;border:1px solid var(--gray-mid);border-radius:14px;padding:24px;}
  .office-card h3{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .office-card p{font-size:14px;color:var(--gray-text);line-height:1.7;}
  .office-card a{color:var(--orange);text-decoration:none;font-weight:600;}
  .cta-band{background:linear-gradient(135deg,var(--orange) 0%,#cc3300 100%);padding:64px 24px;text-align:center;}
  .cta-band h2{color:#fff;font-size:clamp(22px,3vw,34px);font-weight:800;margin-bottom:12px;}
  .cta-band p{color:rgba(255,255,255,.8);font-size:16px;margin-bottom:28px;}
  .btn-white{background:#fff;color:var(--orange);text-decoration:none;font-weight:700;font-size:15px;padding:14px 32px;border-radius:8px;display:inline-block;}
  footer{background:var(--dark);color:rgba(255,255,255,.55);padding:48px 24px 28px;}
  .footer-inner{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:40px;padding-bottom:36px;border-bottom:1px solid rgba(255,255,255,.08);}
  .footer-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .footer-col p{font-size:13px;line-height:1.7;}.footer-col h4{color:#fff;font-size:13px;font-weight:700;letter-spacing:.5px;margin-bottom:14px;}
  .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:8px;}.footer-col ul a{color:rgba(255,255,255,.5);text-decoration:none;font-size:13px;transition:color .2s;}.footer-col ul a:hover{color:#fff;}
  .footer-contact{font-size:13px;display:flex;flex-direction:column;gap:8px;}.footer-contact a{color:rgba(255,255,255,.5);text-decoration:none;}.footer-contact a:hover{color:#fff;}
  .footer-office-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--orange);margin-top:8px;}.footer-office-label:first-child{margin-top:0;}
  .wa-btn{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;text-decoration:none;font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;margin-top:6px;}
  .footer-bottom{max-width:1160px;margin:20px auto 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:12px;}
  @media(max-width:860px){.two-col{grid-template-columns:1fr;}.footer-inner{grid-template-columns:1fr 1fr;}}
  @media(max-width:560px){.footer-inner{grid-template-columns:1fr;}.stat-grid{grid-template-columns:1fr 1fr;}}
</style>
