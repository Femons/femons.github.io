    /* === / NAV CSS === */

  :root {
    --orange: #FF4103;
    --dark: #001621;
    --dark2: #00243a;
    --white: #ffffff;
    --gray-light: #f4f6f8;
    --gray-mid: #e2e8ed;
    --gray-text: #6b7a8a;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--white); color: var(--dark); font-size: 15px; line-height: 1.6; }

  /* ── NAV ── */
nav {
  background: #001621;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 32px;
  height: 68px;
  display: flex;
  align-items: center;
  gap: 0;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  margin-right: 40px;
  flex-shrink: 0;
}
.logo-icon {
  width: 38px;
  height: 38px;
  background: #FF4103;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  color: #fff;
  font-size: 17px;
}
.logo-text {
  color: #fff;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -.3px;
}
.logo-text span { color: #FF4103; }
.nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
  list-style: none;
  flex: 1;
}
.nav-links a {
  color: rgba(255,255,255,.65);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 7px 13px;
  border-radius: 7px;
  transition: color .18s, background .18s;
  white-space: nowrap;
}
.nav-links a:hover,
.nav-links a.active {
  color: #fff;
  background: rgba(255,255,255,.09);
}
.nav-cta {
  background: #FF4103 !important;
  color: #fff !important;
  font-weight: 700 !important;
  padding: 9px 20px !important;
  border-radius: 8px !important;
  margin-left: 8px;
  transition: background .18s !important;
}
.nav-cta:hover { background: #e03800 !important; }
.nav-phone {
  color: rgba(255,255,255,.5);
  font-size: 13px;
  text-decoration: none;
  margin-left: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-phone:hover { color: #fff; }
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 6px;
  background: none;
  border: none;
  margin-left: 12px;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: #fff;
  border-radius: 2px;
  transition: all .3s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-nav {
  display: none;
  position: fixed;
  top: 68px;
  left: 0; right: 0; bottom: 0;
  background: #001621;
  z-index: 999;
  padding: 24px 20px;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
}
.mobile-nav.open { display: flex; }
.mobile-nav a {
  color: rgba(255,255,255,.8);
  text-decoration: none;
  font-size: 17px;
  font-weight: 600;
  padding: 14px 18px;
  border-radius: 10px;
  border-bottom: 1px solid rgba(255,255,255,.05);
  transition: background .2s;
}
.mobile-nav a:hover { color: #fff; background: rgba(255,65,3,.15); }
.mobile-nav .mob-cta {
  background: #FF4103 !important;
  color: #fff !important;
  text-align: center;
  margin-top: 12px;
  border-radius: 10px !important;
  border-bottom: none !important;
  font-size: 16px;
}
@media (max-width: 960px) {
  .nav-links { display: none; }
  .nav-phone { display: none; }
  .hamburger { display: flex; }
  .nav-inner { padding: 0 20px; }
}
@media (max-width: 480px) {
  .logo-text { font-size: 15px; }
}
  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 60%, #003355 100%);
    padding: 72px 24px 60px;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 65% 40%, rgba(255,65,3,.15) 0%, transparent 55%);
  }
  .hero-eyebrow {
    display: inline-block;
    background: rgba(255,65,3,.15); color: var(--orange);
    font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
    padding: 5px 16px; border-radius: 20px; margin-bottom: 20px;
    border: 1px solid rgba(255,65,3,.3);
    position: relative;
  }
  .hero h1 {
    color: #fff; font-size: clamp(28px, 4.5vw, 48px); font-weight: 800;
    line-height: 1.15; margin-bottom: 16px; position: relative;
  }
  .hero h1 em { color: var(--orange); font-style: normal; }
  .hero p {
    color: rgba(255,255,255,.65); max-width: 580px; margin: 0 auto 32px;
    font-size: 16px; position: relative;
  }
  .hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; position: relative; }
  .btn-primary {
    background: var(--orange); color: #fff; text-decoration: none;
    font-weight: 700; font-size: 15px; padding: 13px 28px; border-radius: 8px;
    transition: background .2s, transform .15s;
  }
  .btn-primary:hover { background: #e03800; transform: translateY(-1px); }
  .btn-ghost {
    background: rgba(255,255,255,.08); color: #fff; text-decoration: none;
    font-weight: 600; font-size: 15px; padding: 13px 28px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,.2);
    transition: background .2s;
  }
  .btn-ghost:hover { background: rgba(255,255,255,.14); }

  /* ── CAMPUS IMAGE BAND ── */
  .img-band {
    width: 100%; height: 420px; overflow: hidden;
    background: var(--dark2);
    position: relative;
  }
  .img-slider { position: absolute; inset: 0; }
  .img-slide {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0; transition: opacity 1s ease;
  }
  .img-slide.active { opacity: 1; }
  .img-slide::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,22,33,.2) 0%, rgba(0,22,33,.65) 100%);
  }
  .img-dots {
    position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 3;
  }
  .img-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.4); cursor: pointer;
    transition: background .3s, transform .3s;
    border: none;
  }
  .img-dot.active { background: var(--orange); transform: scale(1.3); }
  .img-caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 32px 16px;
    color: rgba(255,255,255,.75); font-size: 13px;
    z-index: 2;
  }
  .img-caption strong { display: block; color: #fff; font-size: 15px; margin-bottom: 2px; }
  @media(max-width:600px){ .img-band { height: 260px; } }

  /* ── SECTION SHELL ── */
  .section { padding: 72px 24px; }
  .section-inner { max-width: 1160px; margin: 0 auto; }
  .section-alt { background: var(--gray-light); }
  .section-dark { background: var(--dark); }

  .section-eyebrow {
    display: inline-block;
    font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
    color: var(--orange); margin-bottom: 12px;
  }
  .section-title {
    font-size: clamp(22px, 3vw, 34px); font-weight: 800; line-height: 1.2;
    margin-bottom: 16px; color: var(--dark);
  }
  .section-title-white { color: #fff; }
  .section-lead { color: var(--gray-text); font-size: 16px; max-width: 640px; line-height: 1.7; }
  .section-lead-white { color: rgba(255,255,255,.6); }

  /* ── 4 AVANTAJ KARTLARI ── */
  .adv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 40px;
  }
  .adv-card {
    background: #fff;
    border: 1px solid var(--gray-mid);
    border-radius: 12px;
    padding: 28px 24px;
    transition: box-shadow .2s, transform .15s;
  }
  .adv-card:hover { box-shadow: 0 8px 28px rgba(0,22,33,.09); transform: translateY(-2px); }
  .adv-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: rgba(255,65,3,.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 16px;
  }
  .adv-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--dark); }
  .adv-card p { font-size: 14px; color: var(--gray-text); line-height: 1.6; }
  .adv-badge {
    display: inline-block; margin-top: 12px;
    background: rgba(255,65,3,.1); color: var(--orange);
    font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 20px;
  }

  /* ── EĞİTİM DİLİ ── */
  .lang-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
    margin-top: 40px; align-items: center;
  }
  .lang-options { display: flex; flex-direction: column; gap: 14px; }
  .lang-option {
    display: flex; align-items: flex-start; gap: 14px;
    background: #fff; border: 1px solid var(--gray-mid);
    border-radius: 10px; padding: 18px 20px;
  }
  .lang-num {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--orange); color: #fff;
    font-weight: 800; font-size: 15px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .lang-option h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .lang-option p { font-size: 13px; color: var(--gray-text); }
  .lang-note {
    background: rgba(255,65,3,.07); border: 1px solid rgba(255,65,3,.2);
    border-radius: 10px; padding: 20px 22px; margin-top: 16px;
  }
  .lang-note p { font-size: 14px; color: var(--dark); line-height: 1.7; }
  .lang-visual {
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
    border-radius: 16px; padding: 40px 32px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .lang-stat { color: #fff; }
  .lang-stat .num { font-size: 42px; font-weight: 900; color: var(--orange); line-height: 1; }
  .lang-stat .label { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 4px; }
  .lang-divider { height: 1px; background: rgba(255,255,255,.1); }

  /* ── FAKÜLTELİ ── */
  .faculty-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px; margin-top: 36px;
  }
  .faculty-pill {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px; padding: 16px 18px;
    display: flex; align-items: center; gap: 10px;
    color: rgba(255,255,255,.8); font-size: 14px; font-weight: 500;
    transition: background .2s, border-color .2s;
    cursor: default;
  }
  .faculty-pill:hover { background: rgba(255,65,3,.12); border-color: rgba(255,65,3,.3); color: #fff; }
  .faculty-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }
  .faculty-pill .popular {
    margin-left: auto; font-size: 10px; font-weight: 700; color: var(--orange);
    background: rgba(255,65,3,.15); padding: 2px 8px; border-radius: 10px;
  }

  /* ── ŞEHİR ── */
  .city-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
    margin-top: 40px; align-items: start;
  }
  .city-list { display: flex; flex-direction: column; gap: 16px; }
  .city-item {
    display: flex; align-items: flex-start; gap: 16px;
    padding-bottom: 16px; border-bottom: 1px solid var(--gray-mid);
  }
  .city-item:last-child { border-bottom: none; padding-bottom: 0; }
  .city-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,65,3,.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .city-item h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .city-item p { font-size: 13px; color: var(--gray-text); line-height: 1.5; }
  .city-map-placeholder {
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
    border-radius: 16px; min-height: 340px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; color: rgba(255,255,255,.35); font-size: 14px; text-align: center;
    padding: 32px;
  }
  .city-map-placeholder svg { opacity: .25; }

  /* ── POPÜLER BÖLÜMLER ── */
  .popular-wrap { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
  .popular-tag {
    background: #fff; border: 1px solid var(--gray-mid);
    color: var(--dark); font-size: 14px; font-weight: 500;
    padding: 8px 18px; border-radius: 24px;
    transition: background .2s, border-color .2s, color .2s;
    cursor: default;
  }
  .popular-tag:hover { background: var(--orange); border-color: var(--orange); color: #fff; }

  /* ── VİDEO ── */
  .video-section { padding: 72px 24px; background: var(--dark); }
  .video-inner { max-width: 900px; margin: 0 auto; text-align: center; }
  .video-inner .section-eyebrow { color: var(--orange); }
  .video-inner .section-title { color: #fff; margin-bottom: 10px; }
  .video-inner .section-lead { color: rgba(255,255,255,.55); margin: 0 auto 36px; }
  .video-wrapper {
    position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
    border-radius: 16px; box-shadow: 0 24px 60px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.08);
  }
  .video-wrapper iframe {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border: none; border-radius: 16px;
  }

  /* ── CTA BAND ── */
  .cta-band {
    background: linear-gradient(135deg, var(--orange) 0%, #cc3300 100%);
    padding: 64px 24px; text-align: center;
  }
  .cta-band h2 { color: #fff; font-size: clamp(22px, 3vw, 34px); font-weight: 800; margin-bottom: 12px; }
  .cta-band p { color: rgba(255,255,255,.8); font-size: 16px; margin-bottom: 28px; }
  .btn-white {
    background: #fff; color: var(--orange); text-decoration: none;
    font-weight: 700; font-size: 15px; padding: 14px 32px; border-radius: 8px;
    transition: background .15s;
    display: inline-block;
  }
  .btn-white:hover { background: #ffe8e0; }

  /* ── FOOTER ── */
  footer { background: var(--dark); color: rgba(255,255,255,.55); padding: 48px 24px 28px; }
  .footer-inner {
    max-width: 1160px; margin: 0 auto;
    display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; gap: 40px;
    padding-bottom: 36px; border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .footer-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .footer-col p { font-size: 13px; line-height: 1.7; }
  .footer-col h4 { color: #fff; font-size: 13px; font-weight: 700; letter-spacing: .5px; margin-bottom: 14px; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .footer-col ul a { color: rgba(255,255,255,.5); text-decoration: none; font-size: 13px; transition: color .2s; }
  .footer-col ul a:hover { color: #fff; }
  .footer-contact { font-size: 13px; display: flex; flex-direction: column; gap: 10px; }
  .footer-contact a { color: rgba(255,255,255,.5); text-decoration: none; }
  .footer-contact a:hover { color: #fff; }
  .wa-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #25D366; color: #fff; text-decoration: none;
    font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 8px; margin-top: 4px;
  }
  .footer-bottom {
    max-width: 1160px; margin: 20px auto 0;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
    font-size: 12px;
  }
  @media(max-width:900px){
    .lang-grid, .city-grid { grid-template-columns: 1fr; }
    .footer-inner { grid-template-columns: 1fr 1fr; }
  }
  @media(max-width:600px){
    .footer-inner { grid-template-columns: 1fr; }
    .adv-grid { grid-template-columns: 1fr; }
  }

  /* ── MOBİL MENÜ ── */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }
  .hamburger span {

    width: 24px;
    height: 2px;
    background: #fff;
    border-radius: 2px;

  }

  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .mobile-nav {
    display: none;
    position: fixed;
    top: 64px; left: 0; right: 0; bottom: 0;
    background: var(--dark);
    z-index: 99;
    padding: 24px;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a {
    color: rgba(255,255,255,.8);
    text-decoration: none;
    font-size: 18px;
    font-weight: 600;
    padding: 14px 16px;
    border-radius: 10px;
    border-bottom: 1px solid rgba(255,255,255,.06);

    border-bottom: none !important;
  }
  @media(max-width:900px){
    .nav-links { display: none; }
    .hamburger { display: flex; }
    .nav-phone { display: none; }

</style>
