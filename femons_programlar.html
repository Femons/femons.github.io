<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* === NAV CSS === */
.container{max-width:1180px;margin:0 auto;padding:0 24px}
nav{position:sticky;top:0;z-index:1000;background:rgba(0,22,33,.98);box-shadow:0 2px 18px rgba(0,0,0,.28)}
.nav-inner{height:74px;display:flex;align-items:center;gap:18px}
.logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:900;margin-right:auto;text-decoration:none}
.logo-mark{width:40px;height:40px;background:var(--orange);border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:18px;color:#fff}
.logo span{color:var(--orange)}
.menu{display:flex;align-items:center;gap:3px;flex:1;justify-content:flex-end;white-space:nowrap}
.menu a{color:rgba(255,255,255,.72);font-size:13px;font-weight:650;padding:8px 8px;border-radius:9px;text-decoration:none;line-height:1}
.menu a:hover,.menu a.active{background:rgba(255,255,255,.1);color:#fff}
.menu .cta-mini{background:var(--orange);color:#fff;padding:11px 14px;margin-left:4px}
.menu .cta-mini:hover{background:#e03800}
.nav-phone{color:#fff;font-weight:800;opacity:.9;padding-left:10px;font-size:13px;text-decoration:none;white-space:nowrap}
.mobile-toggle{display:none;background:var(--orange);color:#fff;border:0;border-radius:9px;padding:10px 14px;font-weight:900;cursor:pointer;margin-left:auto;font-size:14px}
@media(max-width:960px){
  .nav-phone{display:none}
  .mobile-toggle{display:block}
  .menu{display:none;position:absolute;top:74px;left:0;right:0;background:#001621;padding:14px 18px;flex-direction:column;align-items:stretch;white-space:normal;box-shadow:0 18px 35px rgba(0,0,0,.25);z-index:999}
  .menu.open{display:flex}
  .menu a{font-size:15px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
  .menu .cta-mini{margin-left:0;text-align:center}
  .container{padding:0 18px}
}
/* === / NAV CSS === */

    

  :root {
    --orange: #FF4103;
    --dark: #001621;
    --dark2: #00243a;
    --white: #ffffff;
    --gray-light: #f4f6f8;
    --gray-mid: #e2e8ed;
    --gray-text: #6b7a8a;
    --card-radius: 12px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--gray-light);
    color: var(--dark);
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── NAVBAR ── */
  
  
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; color: #fff; font-size: 16px; letter-spacing: -1px;
  }
  .logo-text { color: #fff; font-weight: 700; font-size: 17px; letter-spacing: .2px; }
  .logo-text span { color: var(--orange); }

  
  
  

  .nav-cta {
    background: var(--orange);
    color: #fff !important;
    padding: 8px 18px !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
  }
  .nav-cta:hover { background: #e03800 !important; }

  .nav-phone {
    color: rgba(255,255,255,.6);
    font-size: 13px;
    text-decoration: none;
    white-space: nowrap;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
    padding: 56px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 70% 50%, rgba(255,65,3,.12) 0%, transparent 60%);
  }
  .hero-eyebrow {
    display: inline-block;
    background: rgba(255,65,3,.15);
    color: var(--orange);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 18px;
    border: 1px solid rgba(255,65,3,.3);
  }
  .hero h1 {
    color: #fff;
    font-size: clamp(26px, 4vw, 40px);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 14px;
    position: relative;
  }
  .hero p {
    color: rgba(255,255,255,.65);
    max-width: 600px;
    margin: 0 auto 28px;
    font-size: 15px;
  }
  .hero-btn {
    display: inline-block;
    background: var(--orange);
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    padding: 13px 30px;
    border-radius: 8px;
    transition: background .2s, transform .15s;
    position: relative;
  }
  .hero-btn:hover { background: #e03800; transform: translateY(-1px); }

  /* ── FILTERS ── */
  .filters-wrap {
    background: #fff;
    border-bottom: 1px solid var(--gray-mid);
    position: sticky;
    top: 64px;
    z-index: 80;
  }
  .filters-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--gray-light);
    border: 1px solid var(--gray-mid);
    border-radius: 8px;
    padding: 8px 14px;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }
  .search-box svg { color: var(--gray-text); flex-shrink: 0; }
  .search-box input {
    border: none; background: transparent; outline: none;
    font-size: 14px; color: var(--dark); width: 100%;
    font-family: var(--font);
  }
  .search-box input::placeholder { color: var(--gray-text); }

  .filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .filter-btn {
    background: var(--gray-light);
    border: 1px solid var(--gray-mid);
    color: var(--dark);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all .2s;
    font-family: var(--font);
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--orange); color: var(--orange); }
  .filter-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }

  /* ── UNI TABS ── */
  .uni-tabs-wrap {
    background: #fff;
    border-bottom: 1px solid var(--gray-mid);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .uni-tabs-wrap::-webkit-scrollbar { display: none; }
  .uni-tabs {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 0;
    min-width: max-content;
  }
  .uni-tab {
    padding: 14px 20px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--gray-text);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: color .2s, border-color .2s;
    font-family: var(--font);
    background: none;
    border-left: none; border-right: none; border-top: none;
  }
  .uni-tab:hover { color: var(--dark); }
  .uni-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

  /* ── MAIN ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  .results-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .results-count {
    font-size: 14px;
    color: var(--gray-text);
  }
  .results-count strong { color: var(--dark); }

  /* ── GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 20px;
  }

  .card {
    background: #fff;
    border-radius: var(--card-radius);
    border: 1px solid var(--gray-mid);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow .2s, transform .15s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .card:hover {
    box-shadow: 0 8px 32px rgba(0,22,33,.10);
    transform: translateY(-2px);
  }

  .card-img {
    height: 150px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
  }
  .card-img-inner {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    position: relative;
    z-index: 1;
  }
  .card-img::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,22,33,.7) 100%);
  }
  .card-uni-badge {
    position: absolute;
    bottom: 10px; left: 12px;
    z-index: 2;
    background: rgba(255,65,3,.9);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .3px;
  }

  .card-body {
    padding: 18px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-faculty {
    font-size: 11px;
    font-weight: 700;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: .8px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.3;
  }
  .card-level-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 12px;
    width: fit-content;
  }
  .level-hazirlik { background: #fff3e0; color: #e65100; }
  .level-lisans { background: #e3f2fd; color: #0277bd; }
  .level-yuksek { background: #f3e5f5; color: #7b1fa2; }
  .level-doktora { background: #e8f5e9; color: #2e7d32; }

  .card-desc {
    font-size: 13px;
    color: var(--gray-text);
    line-height: 1.5;
    flex: 1;
  }

  .card-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--gray-light);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card-meta-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--gray-text);
  }
  .card-meta-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--dark);
  }

  .card-cta {
    padding: 12px 20px;
    background: var(--gray-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    color: var(--orange);
    border-top: 1px solid var(--gray-mid);
  }
  .card:hover .card-cta { background: var(--orange); color: #fff; }
  .card-cta svg { transition: transform .2s; }
  .card:hover .card-cta svg { transform: translateX(4px); }

  /* empty state */
  .empty {
    text-align: center;
    padding: 64px 24px;
    color: var(--gray-text);
    display: none;
  }
  .empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--dark); }

  /* ── FOOTER ── */
  footer {
    background: var(--dark);
    color: rgba(255,255,255,.6);
    padding: 48px 24px 28px;
  }
  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.5fr;
    gap: 40px;
    padding-bottom: 36px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .footer-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .footer-logo .logo-icon { width: 32px; height: 32px; font-size: 14px; }
  .footer-logo .logo-text { font-size: 16px; }
  .footer-col p { font-size: 13px; line-height: 1.7; }
  .footer-col h4 { color: #fff; font-size: 13px; font-weight: 700; letter-spacing: .5px; margin-bottom: 14px; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .footer-col ul a { color: rgba(255,255,255,.55); text-decoration: none; font-size: 13px; transition: color .2s; }
  .footer-col ul a:hover { color: #fff; }
  .footer-contact { font-size: 13px; display: flex; flex-direction: column; gap: 10px; }
  .footer-contact a { color: rgba(255,255,255,.55); text-decoration: none; transition: color .2s; }
  .footer-contact a:hover { color: #fff; }
  .wa-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #25D366; color: #fff;
    text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 9px 16px; border-radius: 8px; margin-top: 4px;
    transition: background .2s;
  }
  .wa-btn:hover { background: #20bd59; }
  .footer-bottom {
    max-width: 1200px; margin: 20px auto 0;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px;
    font-size: 12px;
  }

  /* mobile nav bar bottom */
  .mobile-bar {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--dark);
    border-top: 1px solid rgba(255,255,255,.1);
    z-index: 200;
    padding: 8px 0;
  }
  .mobile-bar-inner {
    display: flex; justify-content: space-around;
  }
  .mobile-bar a {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: rgba(255,255,255,.5); text-decoration: none; font-size: 10px; font-weight: 600;
    padding: 4px 12px;
  }
  .mobile-bar a.active, .mobile-bar a:hover { color: var(--orange); }

  @media (max-width: 900px) {
    
    .footer-inner { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .mobile-bar { display: block; }
    body { padding-bottom: 64px; }
    .footer-inner { grid-template-columns: 1fr; }
    .cards-grid { grid-template-columns: 1fr; }
  }

  /* ── MOBİL MENÜ ── */
  
  
  
  
  
  .mobile-
  
  
  
  
  @media(max-width:900px){
    
    
    .nav-phone { display: none; }
  }

</style>
</head>
