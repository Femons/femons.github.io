<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* === NAV CSS === */
.container{max-width:1180px;margin:0 auto;padding:0 24px}
nav{position:sticky;top:0;z-index:1000;background:rgba(0,22,33,.98);box-shadow:0 2px 18px rgba(0,0,0,.28)}
.nav-inner{height:74px;display:flex;align-items:center;gap:18px}
.logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:900;margin-right:auto;text-decoration:none}
.logo-mark{width:40px;height:40px;background:var(--orange);border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:18px;color:#fff}
.logo span{color:var(--orange)}
.menu{display:flex;align-items:center;gap:3px;flex:1;justify-content:flex-end;white-space:nowrap}
.menu a{color:rgba(255,255,255,.72);font-size:13px;font-weight:650;padding:8px 8px;border-radius:9px;text-decoration:none;line-height:1}
.menu a:hover,.menu a.active{background:rgba(255,255,255,.1);color:#fff}
.menu .cta-mini{background:var(--orange);color:#fff;padding:11px 14px;margin-left:4px}
.menu .cta-mini:hover{background:#e03800}
.nav-phone{color:#fff;font-weight:800;opacity:.9;padding-left:10px;font-size:13px;text-decoration:none;white-space:nowrap}
.mobile-toggle{display:none;background:var(--orange);color:#fff;border:0;border-radius:9px;padding:10px 14px;font-weight:900;cursor:pointer;margin-left:auto;font-size:14px}
@media(max-width:960px){
  .nav-phone{display:none}
  .mobile-toggle{display:block}
  .menu{display:none;position:absolute;top:74px;left:0;right:0;background:#001621;padding:14px 18px;flex-direction:column;align-items:stretch;white-space:normal;box-shadow:0 18px 35px rgba(0,0,0,.25);z-index:999}
  .menu.open{display:flex}
  .menu a{font-size:15px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
  .menu .cta-mini{margin-left:0;text-align:center}
  .container{padding:0 18px}
}
/* === / NAV CSS === */

    

  :root {
    --orange: #FF4103;
    --dark: #001621;
    --dark2: #00243a;
    --white: #ffffff;
    --gray-light: #f4f6f8;
    --gray-mid: #e2e8ed;
    --gray-text: #6b7a8a;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--white); color: var(--dark); font-size: 15px; line-height: 1.6; }

  /* ── NAV ── */


.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  margin-right: 40px;
  flex-shrink: 0;
}
.logo-icon {
  width: 38px;
  height: 38px;
  background: #FF4103;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  color: #fff;
  font-size: 17px;
}
.logo-text {
  color: #fff;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -.3px;
}
.logo-text span { color: #FF4103; }



.nav-cta {
  background: #FF4103 !important;
  color: #fff !important;
  font-weight: 700 !important;
  padding: 9px 20px !important;
  border-radius: 8px !important;
  margin-left: 8px;
  transition: background .18s !important;
}
.nav-cta:hover { background: #e03800 !important; }
.nav-phone {
  color: rgba(255,255,255,.5);
  font-size: 13px;
  text-decoration: none;
  margin-left: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-phone:hover { color: #fff; }





.mobile-




@media (max-width: 960px) {
  
  .nav-phone { display: none; }
  
  
}
@media (max-width: 480px) {
  .logo-text { font-size: 15px; }
}
  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
    padding: 64px 24px 56px; position: relative; overflow: hidden;
  }
  .hero::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 70% 40%, rgba(255,65,3,.13) 0%, transparent 55%); }
  .hero-inner { max-width: 1160px; margin: 0 auto; position: relative; }
  .hero-eyebrow { display:inline-block; background:rgba(255,65,3,.15); color:var(--orange); font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; padding:5px 16px; border-radius:20px; margin-bottom:18px; border:1px solid rgba(255,65,3,.3); }
  .hero h1 { color:#fff; font-size: clamp(26px,4vw,44px); font-weight:800; line-height:1.2; margin-bottom:14px; max-width: 680px; }
  .hero p { color:rgba(255,255,255,.65); font-size:16px; max-width:580px; margin-bottom:28px; }
  .hero-btns { display:flex; gap:12px; flex-wrap:wrap; }
  .btn-primary { background:var(--orange); color:#fff; text-decoration:none; font-weight:700; font-size:15px; padding:13px 28px; border-radius:8px; transition:background .2s, transform .15s; }
  .btn-primary:hover { background:#e03800; transform:translateY(-1px); }
  .btn-ghost { background:rgba(255,255,255,.08); color:#fff; text-decoration:none; font-weight:600; font-size:15px; padding:13px 28px; border-radius:8px; border:1px solid rgba(255,255,255,.2); transition:background .2s; }
  .btn-ghost:hover { background:rgba(255,255,255,.14); }

  /* ── BADGES ── */
  .hero-badges { display:flex; flex-wrap:wrap; gap:10px; margin-top:32px; }
  .hero-badge { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); border-radius:8px; padding:9px 14px; color:rgba(255,255,255,.8); font-size:13px; font-weight:500; }
  .hero-badge span { color:var(--orange); font-size:16px; }

  /* ── SECTION ── */
  .section { padding: 72px 24px; }
  .section-alt { background: var(--gray-light); }
  .section-dark { background: var(--dark); }
  .section-inner { max-width: 1160px; margin: 0 auto; }
  .section-eyebrow { display:inline-block; font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--orange); margin-bottom:12px; }
  .section-title { font-size: clamp(22px,3vw,34px); font-weight:800; line-height:1.2; margin-bottom:12px; }
  .section-title-white { color:#fff; }
  .section-lead { color:var(--gray-text); font-size:16px; max-width:620px; line-height:1.7; margin-bottom:48px; }

  /* ── ADIMLAR ── */
  .steps { display: flex; flex-direction: column; gap: 0; position: relative; }
  .steps::before {
    content: '';
    position: absolute;
    left: 36px;
    top: 48px;
    bottom: 48px;
    width: 2px;
    background: linear-gradient(to bottom, var(--orange), rgba(255,65,3,.1));
  }
  .step { display: grid; grid-template-columns: 72px 1fr; gap: 24px; align-items: flex-start; padding: 24px 0; position: relative; }
  .step:last-child { padding-bottom: 0; }
  .step-num {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--white); border: 2px solid var(--gray-mid);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; flex-shrink: 0; position: relative; z-index: 1;
    transition: border-color .3s, box-shadow .3s;
  }
  .step:hover .step-num { border-color: var(--orange); box-shadow: 0 0 0 6px rgba(255,65,3,.08); }
  .step-num .num { font-size: 22px; font-weight: 900; color: var(--orange); line-height: 1; }
  .step-num .icon { font-size: 18px; margin-top: 2px; }
  .step-content { padding: 12px 0; }
  .step-content h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .step-content p { font-size: 14px; color: var(--gray-text); line-height: 1.7; max-width: 580px; }
  .step-tag { display:inline-block; margin-top:10px; background:rgba(255,65,3,.1); color:var(--orange); font-size:11px; font-weight:700; padding:3px 12px; border-radius:20px; }

  /* ── BELGELER ── */
  .docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 40px; }
  .doc-card { background:#fff; border:1px solid var(--gray-mid); border-radius:12px; padding:20px 20px 18px; transition: box-shadow .2s, transform .15s; }
  .doc-card:hover { box-shadow: 0 6px 24px rgba(0,22,33,.08); transform: translateY(-2px); }
  .doc-icon { font-size: 28px; margin-bottom: 10px; }
  .doc-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .doc-card p { font-size: 13px; color: var(--gray-text); line-height: 1.6; }
  .doc-note { display:inline-block; margin-top:10px; font-size:11px; font-weight:700; padding:2px 10px; border-radius:10px; }
  .doc-note.required { background:#fff0ee; color:var(--orange); }
  .doc-note.optional { background:#f0f4f8; color:var(--gray-text); }

  /* ── DESTEK ── */
  .support-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
  .support-item { display:flex; align-items:flex-start; gap:14px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:20px; transition:background .2s; }
  .support-item:hover { background:rgba(255,65,3,.1); border-color:rgba(255,65,3,.25); }
  .support-icon { width:42px; height:42px; border-radius:10px; background:rgba(255,65,3,.15); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .support-item h4 { color:#fff; font-size:15px; font-weight:700; margin-bottom:4px; }
  .support-item p { color:rgba(255,255,255,.55); font-size:13px; line-height:1.6; }

  /* ── CTA ── */
  .cta-band { background: linear-gradient(135deg, var(--orange) 0%, #cc3300 100%); padding:64px 24px; text-align:center; }
  .cta-band h2 { color:#fff; font-size: clamp(22px,3vw,34px); font-weight:800; margin-bottom:12px; }
  .cta-band p { color:rgba(255,255,255,.8); font-size:16px; margin-bottom:28px; }
  .btn-white { background:#fff; color:var(--orange); text-decoration:none; font-weight:700; font-size:15px; padding:14px 32px; border-radius:8px; transition:background .15s; display:inline-block; }
  .btn-white:hover { background:#ffe8e0; }

  /* ── FOOTER ── */
  footer { background: var(--dark); color: rgba(255,255,255,.55); padding: 48px 24px 28px; }
  .footer-inner { max-width: 1160px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; gap: 40px; padding-bottom: 36px; border-bottom: 1px solid rgba(255,255,255,.08); }
  .footer-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .footer-col p { font-size: 13px; line-height: 1.7; }
  .footer-col h4 { color: #fff; font-size: 13px; font-weight: 700; letter-spacing: .5px; margin-bottom: 14px; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .footer-col ul a { color: rgba(255,255,255,.5); text-decoration: none; font-size: 13px; transition: color .2s; }
  .footer-col ul a:hover { color: #fff; }
  .footer-contact { font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
  .footer-contact a { color: rgba(255,255,255,.5); text-decoration: none; transition: color .2s; }
  .footer-contact a:hover { color: #fff; }
  .footer-office-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--orange); margin-top:8px; }
  .footer-office-label:first-child { margin-top:0; }
  .wa-btn { display:inline-flex; align-items:center; gap:8px; background:#25D366; color:#fff; text-decoration:none; font-size:12px; font-weight:600; padding:8px 14px; border-radius:8px; margin-top:6px; }
  .footer-bottom { max-width: 1160px; margin: 20px auto 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 12px; }

  @media(max-width:860px){
    .support-grid { grid-template-columns: 1fr; }
    .steps::before { left: 32px; }
    .step { grid-template-columns: 64px 1fr; }
    .step-num { width:64px; height:64px; }
    .footer-inner { grid-template-columns: 1fr 1fr; }
  }
  @media(max-width:560px){
    .footer-inner { grid-template-columns: 1fr; }
    .docs-grid { grid-template-columns: 1fr; }
  }

  /* ── MOBİL MENÜ ── */

  }

</style>
