<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* === NAV CSS === */
.container{max-width:1180px;margin:0 auto;padding:0 24px}
nav{position:sticky;top:0;z-index:1000;background:rgba(0,22,33,.98);box-shadow:0 2px 18px rgba(0,0,0,.28)}
.nav-inner{height:74px;display:flex;align-items:center;gap:18px}
.logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:900;margin-right:auto;text-decoration:none}
.logo-mark{width:40px;height:40px;background:var(--orange);border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:18px;color:#fff}
.logo span{color:var(--orange)}
.menu{display:flex;align-items:center;gap:3px;flex:1;justify-content:flex-end;white-space:nowrap}
.menu a{color:rgba(255,255,255,.72);font-size:13px;font-weight:650;padding:8px 8px;border-radius:9px;text-decoration:none;line-height:1}
.menu a:hover,.menu a.active{background:rgba(255,255,255,.1);color:#fff}
.menu .cta-mini{background:var(--orange);color:#fff;padding:11px 14px;margin-left:4px}
.menu .cta-mini:hover{background:#e03800}
.nav-phone{color:#fff;font-weight:800;opacity:.9;padding-left:10px;font-size:13px;text-decoration:none;white-space:nowrap}
.mobile-toggle{display:none;background:var(--orange);color:#fff;border:0;border-radius:9px;padding:10px 14px;font-weight:900;cursor:pointer;margin-left:auto;font-size:14px}
@media(max-width:960px){
  .nav-phone{display:none}
  .mobile-toggle{display:block}
  .menu{display:none;position:absolute;top:74px;left:0;right:0;background:#001621;padding:14px 18px;flex-direction:column;align-items:stretch;white-space:normal;box-shadow:0 18px 35px rgba(0,0,0,.25);z-index:999}
  .menu.open{display:flex}
  .menu a{font-size:15px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
  .menu .cta-mini{margin-left:0;text-align:center}
  .container{padding:0 18px}
}
/* === / NAV CSS === */

    

  :root { --orange:#FF4103; --dark:#001621; --dark2:#00243a; --white:#ffffff; --gray-light:#f4f6f8; --gray-mid:#e2e8ed; --gray-text:#6b7a8a; --font:'Segoe UI',system-ui,-apple-system,sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--white);color:var(--dark);font-size:15px;line-height:1.6;}
  
  
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:36px;height:36px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;}
  .logo-text{color:#fff;font-weight:700;font-size:17px;} .logo-text span{color:var(--orange);}
  
  
  
  .nav-cta{background:var(--orange)!important;color:#fff!important;font-weight:600!important;padding:8px 18px!important;border-radius:8px!important;}
  .nav-phone{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;white-space:nowrap;}
  
  
  
  
  
  .mobile-
  
  
  
  
  @media(max-width:900px){.nav-phone{display:none;}}

  .hero{background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 55%,#003050 100%);min-height:88vh;display:flex;align-items:center;padding:64px 24px;position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 50%,rgba(255,65,3,.15) 0%,transparent 55%);}
  .hero-inner{max-width:1160px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;}
  .hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,65,3,.15);color:var(--orange);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:20px;margin-bottom:20px;border:1px solid rgba(255,65,3,.3);}
  .hero h1{color:#fff;font-size:clamp(28px,4vw,52px);font-weight:900;line-height:1.1;margin-bottom:18px;}
  .hero h1 em{color:var(--orange);font-style:normal;display:block;}
  .hero p{color:rgba(255,255,255,.65);font-size:16px;line-height:1.75;margin-bottom:32px;max-width:480px;}
  .hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:40px;}
  .btn-primary{background:var(--orange);color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:14px 28px;border-radius:8px;transition:background .2s,transform .15s;display:inline-block;}
  .btn-primary:hover{background:#e03800;transform:translateY(-1px);}
  .btn-ghost{background:rgba(255,255,255,.08);color:#fff;text-decoration:none;font-weight:600;font-size:15px;padding:14px 28px;border-radius:8px;border:1px solid rgba(255,255,255,.2);transition:background .2s;display:inline-block;}
  .btn-ghost:hover{background:rgba(255,255,255,.14);}
  .hero-stats{display:flex;gap:28px;flex-wrap:wrap;}
  .hero-stat .num{font-size:28px;font-weight:900;color:#fff;line-height:1;} .hero-stat .num span{color:var(--orange);}
  .hero-stat .lbl{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px;}
  .hero-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;backdrop-filter:blur(10px);}
  .hero-card-title{color:rgba(255,255,255,.5);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;}
  .uni-list{display:flex;flex-direction:column;gap:10px;}
  .uni-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.07);transition:background .2s;}
  .uni-row:hover{background:rgba(255,65,3,.1);border-color:rgba(255,65,3,.2);}
  .uni-row-icon{width:36px;height:36px;border-radius:8px;background:rgba(255,65,3,.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .uni-row-info{flex:1;} .uni-row-name{color:#fff;font-size:13px;font-weight:600;line-height:1.3;} .uni-row-city{color:rgba(255,255,255,.4);font-size:11px;}
  .uni-row-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(255,65,3,.2);color:var(--orange);white-space:nowrap;}

  .section{padding:72px 24px;} .section-alt{background:var(--gray-light);} .section-dark{background:var(--dark);}
  .section-inner{max-width:1160px;margin:0 auto;}
  .section-eyebrow{display:inline-block;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:12px;}
  .section-title{font-size:clamp(22px,3vw,36px);font-weight:800;line-height:1.2;margin-bottom:14px;}
  .section-title-white{color:#fff;}
  .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:40px;flex-wrap:wrap;}
  .see-all{color:var(--orange);text-decoration:none;font-size:14px;font-weight:600;white-space:nowrap;} .see-all:hover{text-decoration:underline;}

  .why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:40px;}
  .why-card{background:#fff;border:1px solid var(--gray-mid);border-radius:14px;padding:28px 24px;transition:box-shadow .2s,transform .15s;}
  .why-card:hover{box-shadow:0 8px 28px rgba(0,22,33,.09);transform:translateY(-2px);}
  .why-icon{width:52px;height:52px;border-radius:14px;background:rgba(255,65,3,.1);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:18px;}
  .why-card h3{font-size:17px;font-weight:700;margin-bottom:8px;} .why-card p{font-size:14px;color:var(--gray-text);line-height:1.65;}

  .uni-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:0;}
  .uni-card{background:#fff;border:1px solid var(--gray-mid);border-radius:14px;overflow:hidden;text-decoration:none;color:inherit;transition:box-shadow .2s,transform .15s;display:flex;flex-direction:column;}
  .uni-card:hover{box-shadow:0 8px 28px rgba(0,22,33,.1);transform:translateY(-2px);}
  .uni-card-top{background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%);padding:28px 24px;position:relative;overflow:hidden;}
  .uni-card-emoji{font-size:32px;margin-bottom:12px;} .uni-card-name{color:#fff;font-size:16px;font-weight:700;line-height:1.3;margin-bottom:4px;} .uni-card-city{color:rgba(255,255,255,.5);font-size:12px;}
  .uni-card-body{padding:20px 24px;flex:1;}
  .uni-card-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .uni-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;background:var(--gray-light);color:var(--gray-text);}
  .uni-tag.orange{background:rgba(255,65,3,.1);color:var(--orange);}
  .uni-card-footer{padding:14px 24px;border-top:1px solid var(--gray-light);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;color:var(--orange);}
  .uni-card:hover .uni-card-footer{background:var(--orange);color:#fff;}

  .process-steps{display:grid;grid-template-columns:repeat(6,1fr);gap:0;margin-top:48px;position:relative;}
  .process-steps::before{content:'';position:absolute;top:28px;left:calc(100%/12);right:calc(100%/12);height:2px;background:linear-gradient(to right,var(--orange),rgba(255,65,3,.2));z-index:0;}
  .process-step{text-align:center;padding:0 8px;position:relative;z-index:1;}
  .process-num{width:56px;height:56px;border-radius:50%;background:var(--orange);color:#fff;font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 4px 16px rgba(255,65,3,.3);}
  .process-step h4{font-size:13px;font-weight:700;margin-bottom:6px;color:#fff;} .process-step p{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5;}

  .wa-band{background:linear-gradient(135deg,#1a1a2e 0%,var(--dark) 100%);padding:56px 24px;}
  .wa-inner{max-width:700px;margin:0 auto;text-align:center;}
  .wa-inner h2{color:#fff;font-size:clamp(20px,3vw,32px);font-weight:800;margin-bottom:10px;}
  .wa-inner p{color:rgba(255,255,255,.6);margin-bottom:28px;font-size:15px;}
  .wa-btn-big{display:inline-flex;align-items:center;gap:12px;background:#25D366;color:#fff;text-decoration:none;font-weight:700;font-size:16px;padding:16px 32px;border-radius:12px;transition:background .2s,transform .15s;}
  .wa-btn-big:hover{background:#20bd59;transform:translateY(-1px);}

  .cta-band{background:linear-gradient(135deg,var(--orange) 0%,#cc3300 100%);padding:64px 24px;text-align:center;}
  .cta-band h2{color:#fff;font-size:clamp(22px,3vw,36px);font-weight:800;margin-bottom:12px;}
  .cta-band p{color:rgba(255,255,255,.8);font-size:16px;margin-bottom:28px;}
  .btn-white{background:#fff;color:var(--orange);text-decoration:none;font-weight:700;font-size:15px;padding:14px 32px;border-radius:8px;transition:background .15s;display:inline-block;}
  .btn-white:hover{background:#ffe8e0;}

  footer{background:var(--dark);color:rgba(255,255,255,.55);padding:48px 24px 28px;}
  .footer-inner{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:40px;padding-bottom:36px;border-bottom:1px solid rgba(255,255,255,.08);}
  .footer-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .footer-col p{font-size:13px;line-height:1.7;} .footer-col h4{color:#fff;font-size:13px;font-weight:700;letter-spacing:.5px;margin-bottom:14px;}
  .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
  .footer-col ul a{color:rgba(255,255,255,.5);text-decoration:none;font-size:13px;transition:color .2s;} .footer-col ul a:hover{color:#fff;}
  .footer-contact{font-size:13px;display:flex;flex-direction:column;gap:8px;}
  .footer-contact a{color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s;} .footer-contact a:hover{color:#fff;}
  .footer-office-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--orange);margin-top:8px;} .footer-office-label:first-child{margin-top:0;}
  .wa-btn{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;text-decoration:none;font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;margin-top:6px;}
  .footer-bottom{max-width:1160px;margin:20px auto 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:12px;}

  @media(max-width:860px){.hero-inner{grid-template-columns:1fr;}.hero-card{display:none;}.process-steps{grid-template-columns:repeat(3,1fr);}.process-steps::before{display:none;}.footer-inner{grid-template-columns:1fr 1fr;}}
  @media(max-width:560px){.footer-inner{grid-template-columns:1fr;}.process-steps{grid-template-columns:repeat(2,1fr);}}
</style>
