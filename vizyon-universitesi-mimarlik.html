<style>
    /* === NAV CSS === */
    nav{background:#001621;position:sticky;top:0;z-index:1000;box-shadow:0 2px 16px rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.06);}
    .nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;height:68px;display:flex;align-items:center;gap:0;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:40px;flex-shrink:0;}
    .logo-icon{width:38px;height:38px;background:#FF4103;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:17px;}
    .logo-text{color:#fff;font-weight:800;font-size:17px;letter-spacing:-.3px;}
    .logo-text span{color:#FF4103;}
    .nav-links{display:flex;align-items:center;gap:2px;list-style:none;flex:1;}
    .nav-links a{color:rgba(255,255,255,.65);text-decoration:none;font-size:14px;font-weight:500;padding:7px 13px;border-radius:7px;transition:color .18s,background .18s;white-space:nowrap;}
    .nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.09);}
    .nav-cta{background:#FF4103!important;color:#fff!important;font-weight:700!important;padding:9px 20px!important;border-radius:8px!important;margin-left:8px!important;}
    .nav-cta:hover{background:#e03800!important;}
    .nav-phone{color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;margin-left:20px;white-space:nowrap;flex-shrink:0;}
    .nav-phone:hover{color:#fff;}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;margin-left:12px;}
    .hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;transition:all .3s;}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .mobile-nav{display:none;position:fixed;top:68px;left:0;right:0;bottom:0;background:#001621;z-index:999;padding:24px 20px;flex-direction:column;gap:4px;overflow-y:auto;}

    .mobile-nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:17px;font-weight:600;padding:14px 18px;border-radius:10px;border-bottom:1px solid rgba(255,255,255,.05);transition:background .2s;}
    .mobile-nav a:hover{color:#fff;background:rgba(255,65,3,.15);}
    .mobile-nav .mob-cta{background:#FF4103!important;color:#fff!important;text-align:center;margin-top:12px;border-radius:10px!important;border-bottom:none!important;}

    /* === / NAV CSS === */

  :root{--orange:#FF4103;--dark:#001621;--dark2:#00243a;--white:#fff;--gray-light:#f4f6f8;--gray-mid:#e2e8ed;--gray-text:#6b7a8a;--font:'Segoe UI',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--white);color:var(--dark);font-size:15px;line-height:1.6;}
  nav{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
  .nav-inner{max-width:1160px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:36px;height:36px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;}
  .logo-text{color:#fff;font-weight:700;font-size:17px;}.logo-text span{color:var(--orange);}
  .nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
  .nav-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;font-weight:500;padding:6px 12px;border-radius:6px;transition:.2s;}
  .nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.08);}
  .nav-cta{background:var(--orange)!important;color:#fff!important;font-weight:600!important;padding:8px 18px!important;border-radius:8px!important;}
  .nav-phone{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;}
  .hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;transition:all .3s;}
  .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
  .hamburger.open span:nth-child(2){opacity:0;}
  .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
  .mobile-nav{display:none;position:fixed;top:64px;left:0;right:0;bottom:0;background:var(--dark);z-index:99;padding:24px;flex-direction:column;gap:8px;}
  .mobile-nav.open{display:flex;}
  .mobile-nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:18px;font-weight:600;padding:14px 16px;border-radius:10px;border-bottom:1px solid rgba(255,255,255,.06);}
  .mobile-nav .mob-cta{background:var(--orange);color:#fff!important;text-align:center;margin-top:8px;border-radius:10px!important;border-bottom:none!important;}
  @media(max-width:900px){.nav-links{display:none;}.hamburger{display:flex;}.nav-phone{display:none;}}

  .breadcrumb{background:var(--gray-light);padding:12px 24px;border-bottom:1px solid var(--gray-mid);}
  .breadcrumb-inner{max-width:1160px;margin:0 auto;font-size:13px;color:var(--gray-text);display:flex;align-items:center;gap:6px;}
  .breadcrumb a{color:var(--gray-text);text-decoration:none;}.breadcrumb a:hover{color:var(--orange);}
  .breadcrumb span{color:var(--orange);}

  .hero h1{color:#fff;font-size:clamp(24px,3.5vw,38px);font-weight:900;line-height:1.2;margin-bottom:10px;}
  .hero-sub{color:rgba(255,255,255,.65);font-size:15px;margin-bottom:24px;max-width:520px;line-height:1.7;}
  .hero-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
  .pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.85);font-size:13px;font-weight:500;padding:6px 14px;border-radius:20px;}

  .btn-orange{background:var(--orange);color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:12px 24px;border-radius:8px;display:inline-block;transition:.2s;}
  .btn-orange:hover{background:#e03800;transform:translateY(-1px);}
  .btn-wa{background:#25D366;color:#fff;text-decoration:none;font-weight:600;font-size:14px;padding:12px 20px;border-radius:8px;display:inline-flex;align-items:center;gap:8px;}

  .price-card{background:#fff;border-radius:16px;padding:26px 24px;box-shadow:0 8px 40px rgba(0,0,0,.2);}
  .price-card-uni{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .uni-avatar{width:44px;height:44px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;}
  .uni-name{font-size:13px;font-weight:700;color:var(--dark);line-height:1.3;}
  .uni-loc{font-size:11px;color:var(--gray-text);}
  .price-main{text-align:center;padding:18px 0;border-top:1px solid var(--gray-mid);border-bottom:1px solid var(--gray-mid);margin-bottom:18px;}
  .price-num{font-size:38px;font-weight:900;color:var(--orange);line-height:1;}
  .price-per{font-size:13px;color:var(--gray-text);margin-top:4px;}
  .price-badge{background:rgba(255,65,3,.1);color:var(--orange);font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;display:inline-block;margin-top:6px;}

  .price-cta{display:block;background:var(--orange);color:#fff;text-align:center;text-decoration:none;font-weight:700;font-size:15px;padding:13px;border-radius:8px;margin-bottom:8px;transition:.2s;}
  .price-cta:hover{background:#e03800;}
  .price-wa{display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:#fff;text-decoration:none;font-weight:600;font-size:13px;padding:10px;border-radius:8px;}

  .section{padding:60px 24px;}.section-alt{background:var(--gray-light);}
  .section-inner{max-width:1160px;margin:0 auto;}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:10px;display:block;}
  h2{font-size:clamp(20px,2.8vw,30px);font-weight:800;line-height:1.25;margin-bottom:14px;}
  .lead{color:var(--gray-text);font-size:15px;line-height:1.8;margin-bottom:28px;max-width:760px;}

  /* ÖZEL: 5 Yıl Zaman Çizelgesi */
  .timeline{display:flex;flex-direction:column;gap:0;margin-top:8px;position:relative;}
  .timeline::before{content:'';position:absolute;left:20px;top:0;bottom:0;width:2px;background:var(--gray-mid);}
  .tl-item{display:flex;gap:20px;align-items:flex-start;padding:0 0 28px 0;position:relative;}
  .tl-dot{width:40px;height:40px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0;position:relative;z-index:1;}
  .tl-dot.yl{background:var(--dark);}
  .tl-content{flex:1;padding-top:6px;}
  .tl-year{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-bottom:4px;}
  .tl-year.yl{color:var(--dark);}
  .tl-title{font-size:16px;font-weight:700;margin-bottom:4px;}
  .tl-desc{font-size:13px;color:var(--gray-text);line-height:1.6;}
  .tl-courses{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .tl-course{font-size:11px;background:var(--gray-light);color:var(--dark);padding:3px 10px;border-radius:10px;font-weight:500;}

  .adv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:8px;}
  .adv-card{background:#fff;border:1px solid var(--gray-mid);border-radius:12px;padding:22px 20px;transition:.2s;}

  .adv-card h3{font-size:15px;font-weight:700;margin-bottom:6px;}
  .adv-card p{font-size:13px;color:var(--gray-text);line-height:1.6;}

  /* BLOG PREVİEW */
  .blog-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:28px;}
  .blog-prev-card{background:#fff;border:1px solid var(--gray-mid);border-radius:12px;padding:24px;text-decoration:none;color:inherit;transition:.2s;}
  .blog-prev-card:hover{box-shadow:0 6px 20px rgba(0,22,33,.09);transform:translateY(-2px);}
  .blog-prev-cat{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-bottom:10px;}
  .blog-prev-card h3{font-size:16px;font-weight:700;line-height:1.35;margin-bottom:8px;}
  .blog-prev-card p{font-size:13px;color:var(--gray-text);line-height:1.65;}
  .blog-prev-read{font-size:12px;font-weight:700;color:var(--orange);margin-top:12px;display:block;}

  .career-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:24px;}
  .career-item{background:#fff;border:1px solid var(--gray-mid);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;}
  .career-item .dot{width:7px;height:7px;border-radius:50%;background:var(--orange);flex-shrink:0;}
  .career-item span{font-size:13px;font-weight:500;}

  .other-programs{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;margin-top:20px;}
  .prog-pill{background:#fff;border:1px solid var(--gray-mid);border-radius:10px;padding:14px 18px;text-decoration:none;color:inherit;transition:.2s;display:flex;align-items:center;justify-content:space-between;}
  .prog-pill:hover{box-shadow:0 4px 14px rgba(0,22,33,.08);border-color:var(--orange);}
  .prog-pill-left .name{font-size:14px;font-weight:700;}.prog-pill-left .meta{font-size:11px;color:var(--gray-text);}
  .prog-pill-right .price{font-size:14px;font-weight:800;color:var(--orange);}

  .faq-item{background:#fff;border:1px solid var(--gray-mid);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  .faq-q{width:100%;text-align:left;background:none;border:none;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;font-family:var(--font);font-size:15px;font-weight:600;color:var(--dark);}
  .faq-q.open{color:var(--orange);}
  .faq-icon{width:24px;height:24px;border-radius:50%;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:.3s;}

  .cta-band p{color:rgba(255,255,255,.8);font-size:15px;margin-bottom:24px;}
  .btn-white{background:#fff;color:var(--orange);text-decoration:none;font-weight:700;font-size:15px;padding:13px 30px;border-radius:8px;display:inline-block;}

  .footer-contact{font-size:13px;display:flex;flex-direction:column;gap:8px;}.footer-contact a{color:rgba(255,255,255,.5);text-decoration:none;}.footer-contact a:hover{color:#fff;}

  .wa-btn-f{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;text-decoration:none;font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;margin-top:6px;}
  .footer-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .footer-bottom{max-width:1160px;margin:20px auto 0;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;}

  .wa-float{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  .wa-float-btn{width:58px;height:58px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.45);text-decoration:none;transition:.2s;animation:wa-pulse 2.5s infinite;}
  .wa-float-btn:hover{transform:scale(1.1);}
  @keyframes wa-pulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.45);}50%{box-shadow:0 4px 28px rgba(37,211,102,.7),0 0 0 8px rgba(37,211,102,.12);}}
