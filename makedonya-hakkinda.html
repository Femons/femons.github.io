<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* === NAV CSS === */
.container{max-width:1180px;margin:0 auto;padding:0 24px}
nav{position:sticky;top:0;z-index:1000;background:rgba(0,22,33,.98);box-shadow:0 2px 18px rgba(0,0,0,.28)}
.nav-inner{height:74px;display:flex;align-items:center;gap:18px}
.logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:900;margin-right:auto;text-decoration:none}
.logo-mark{width:40px;height:40px;background:var(--orange);border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:18px;color:#fff}
.logo span{color:var(--orange)}
.menu{display:flex;align-items:center;gap:3px;flex:1;justify-content:flex-end;white-space:nowrap}
.menu a{color:rgba(255,255,255,.72);font-size:13px;font-weight:650;padding:8px 8px;border-radius:9px;text-decoration:none;line-height:1}
.menu a:hover,.menu a.active{background:rgba(255,255,255,.1);color:#fff}
.menu .cta-mini{background:var(--orange);color:#fff;padding:11px 14px;margin-left:4px}
.menu .cta-mini:hover{background:#e03800}
.nav-phone{color:#fff;font-weight:800;opacity:.9;padding-left:10px;font-size:13px;text-decoration:none;white-space:nowrap}
.mobile-toggle{display:none;background:var(--orange);color:#fff;border:0;border-radius:9px;padding:10px 14px;font-weight:900;cursor:pointer;margin-left:auto;font-size:14px}
@media(max-width:960px){
  .nav-phone{display:none}
  .mobile-toggle{display:block}
  .menu{display:none;position:absolute;top:74px;left:0;right:0;background:#001621;padding:14px 18px;flex-direction:column;align-items:stretch;white-space:normal;box-shadow:0 18px 35px rgba(0,0,0,.25);z-index:999}
  .menu.open{display:flex}
  .menu a{font-size:15px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
  .menu .cta-mini{margin-left:0;text-align:center}
  .container{padding:0 18px}
}
/* === / NAV CSS === */

    

  :root{--orange:#FF4103;--dark:#001621;--dark2:#00243a;--gray-light:#f4f6f8;--gray-mid:#e2e8ed;--gray-text:#6b7a8a;--font:'Segoe UI',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}body{font-family:var(--font);background:#fff;color:var(--dark);font-size:15px;line-height:1.6;}
  
  
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-icon{width:36px;height:36px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;}
  .logo-text{color:#fff;font-weight:700;font-size:17px;}.logo-text span{color:var(--orange);}
  
  .nav-cta{background:var(--orange)!important;color:#fff!important;font-weight:600!important;padding:8px 18px!important;border-radius:8px!important;}
  .nav-phone{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;}
  
  
  .mobile-
  
  @media(max-width:900px){.nav-phone{display:none;}}
  .hero-img{width:100%;height:460px;object-fit:cover;display:block;position:relative;}
  .hero-img-wrap{position:relative;overflow:hidden;}
  .hero-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(0,22,33,.85) 0%,rgba(0,22,33,.4) 60%,transparent 100%);}
  .hero-text{position:absolute;top:50%;left:0;transform:translateY(-50%);padding:0 60px;z-index:2;max-width:680px;}
  .hero-eyebrow{display:inline-block;background:rgba(255,65,3,.2);color:var(--orange);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:16px;border:1px solid rgba(255,65,3,.35);}
  .hero-text h1{color:#fff;font-size:clamp(24px,3.5vw,42px);font-weight:900;line-height:1.15;margin-bottom:14px;}
  .hero-text p{color:rgba(255,255,255,.75);font-size:16px;margin-bottom:24px;max-width:500px;}
  .btn-orange{background:var(--orange);color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:13px 28px;border-radius:8px;display:inline-block;transition:background .2s;}
  .btn-orange:hover{background:#e03800;}
  .section{padding:64px 24px;}.section-alt{background:var(--gray-light);}
  .section-inner{max-width:960px;margin:0 auto;}
  .section-inner-wide{max-width:1160px;margin:0 auto;}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:10px;}
  h2{font-size:clamp(22px,3vw,32px);font-weight:800;line-height:1.25;margin-bottom:16px;}
  .lead{color:var(--gray-text);font-size:16px;line-height:1.8;margin-bottom:32px;}
  .content-body{display:grid;grid-template-columns:1fr 340px;gap:48px;align-items:start;}
  .prose h3{font-size:18px;font-weight:700;margin:28px 0 10px;color:var(--dark);}
  .prose h3:first-child{margin-top:0;}
  .prose p{font-size:15px;color:var(--gray-text);line-height:1.8;margin-bottom:14px;}
  .prose ul{margin:10px 0 14px 18px;display:flex;flex-direction:column;gap:6px;}
  .prose ul li{font-size:14px;color:var(--gray-text);line-height:1.6;}
  .prose strong{color:var(--dark);}
  .side-card{background:var(--dark);border-radius:16px;padding:28px;position:sticky;top:84px;}
  .side-card h3{color:#fff;font-size:17px;font-weight:800;margin-bottom:8px;}
  .side-card p{color:rgba(255,255,255,.6);font-size:13px;line-height:1.7;margin-bottom:20px;}
  .side-card .btn-orange{width:100%;text-align:center;margin-bottom:10px;}
  .side-card .wa-link{display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:#fff;text-decoration:none;font-weight:600;font-size:14px;padding:11px;border-radius:8px;}
  .side-facts{margin-top:20px;border-top:1px solid rgba(255,255,255,.1);padding-top:16px;display:flex;flex-direction:column;gap:12px;}
  .fact{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.7);font-size:13px;}
  .fact-icon{font-size:18px;flex-shrink:0;}
  .faq-item{background:#fff;border:1px solid var(--gray-mid);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  .faq-q{width:100%;text-align:left;background:none;border:none;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;font-family:var(--font);font-size:15px;font-weight:600;color:var(--dark);}
  .faq-q.open{color:var(--orange);}
  .faq-icon{width:24px;height:24px;border-radius:50%;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:transform .3s;}
  .faq-q.open .faq-icon{transform:rotate(45deg);background:rgba(255,65,3,.1);color:var(--orange);}
  .faq-a{display:none;padding:0 20px 16px;font-size:14px;color:var(--gray-text);line-height:1.75;}
  .faq-a.open{display:block;}
  .cta-band{background:linear-gradient(135deg,var(--orange) 0%,#cc3300 100%);padding:56px 24px;text-align:center;}
  .cta-band h2{color:#fff;margin-bottom:10px;}.cta-band p{color:rgba(255,255,255,.8);margin-bottom:24px;}
  .btn-white{background:#fff;color:var(--orange);text-decoration:none;font-weight:700;font-size:15px;padding:13px 28px;border-radius:8px;display:inline-block;}
  footer{background:var(--dark);color:rgba(255,255,255,.55);padding:48px 24px 28px;}
  .footer-inner{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:40px;padding-bottom:36px;border-bottom:1px solid rgba(255,255,255,.08);}
  .footer-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .footer-col p{font-size:13px;line-height:1.7;}.footer-col h4{color:#fff;font-size:13px;font-weight:700;margin-bottom:14px;}
  .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:8px;}.footer-col ul a{color:rgba(255,255,255,.5);text-decoration:none;font-size:13px;}.footer-col ul a:hover{color:#fff;}
  .footer-contact{font-size:13px;display:flex;flex-direction:column;gap:8px;}.footer-contact a{color:rgba(255,255,255,.5);text-decoration:none;}.footer-contact a:hover{color:#fff;}
  .footer-office-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--orange);margin-top:8px;}.footer-office-label:first-child{margin-top:0;}
  .wa-btn{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;text-decoration:none;font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;margin-top:6px;}
  .footer-bottom{max-width:1160px;margin:20px auto 0;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;}
  .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:32px;}
  .related-card{background:#fff;border:1px solid var(--gray-mid);border-radius:12px;padding:20px;text-decoration:none;color:inherit;transition:box-shadow .2s,transform .15s;display:flex;align-items:center;gap:14px;}
  .related-card:hover{box-shadow:0 6px 20px rgba(0,22,33,.09);transform:translateY(-2px);}
  .related-icon{font-size:28px;flex-shrink:0;}
  .related-card h4{font-size:14px;font-weight:700;margin-bottom:3px;}
  .related-card p{font-size:12px;color:var(--gray-text);}
  @media(max-width:860px){.content-body{grid-template-columns:1fr;}.side-card{position:static;}.hero-text{padding:0 24px;}.hero-img{height:320px;}.footer-inner{grid-template-columns:1fr 1fr;}}
  @media(max-width:560px){.footer-inner{grid-template-columns:1fr;}}

  .cost-table { width:100%; border-collapse:collapse; margin:24px 0; font-size:14px; }
  .cost-table th { background:var(--dark); color:#fff; padding:12px 16px; text-align:left; font-size:12px; letter-spacing:.5px; }
  .cost-table td { padding:12px 16px; border-bottom:1px solid var(--gray-mid); }
  .cost-table tr:last-child td { border-bottom:none; }
  .cost-table tr:hover td { background:var(--gray-light); }
  .cost-table .hl { font-weight:700; color:var(--dark); }
  .cost-table .orange { color:var(--orange); font-weight:700; }
  .cost-table .green { color:#2e7d32; font-weight:700; }
  .compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin:32px 0; }
  .compare-col { border-radius:12px; overflow:hidden; border:1px solid var(--gray-mid); }
  .compare-head { padding:16px 20px; font-weight:800; font-size:15px; display:flex; align-items:center; gap:10px; }
  .compare-head.tr { background:#e8f5e9; color:#1b5e20; }
  .compare-head.mk { background:rgba(255,65,3,.1); color:var(--orange); }
  .compare-body { padding:16px 20px; display:flex; flex-direction:column; gap:10px; }
  .compare-row { display:flex; justify-content:space-between; align-items:center; font-size:14px; padding-bottom:8px; border-bottom:1px solid var(--gray-light); }
  .compare-row:last-child { border-bottom:none; padding-bottom:0; }
  .compare-row .label { color:var(--gray-text); }
  .compare-row .value { font-weight:700; color:var(--dark); }
  .schema-note { background:var(--gray-light); border-left:3px solid var(--orange); padding:16px 20px; border-radius:0 8px 8px 0; margin:24px 0; font-size:13px; color:var(--gray-text); }
  .schema-note strong { color:var(--dark); }
  .city-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; margin-top:28px; }
  .city-card { background:#fff; border:1px solid var(--gray-mid); border-radius:12px; padding:20px; }
  .city-card h4 { font-size:15px; font-weight:700; margin-bottom:8px; }
  .city-card p { font-size:13px; color:var(--gray-text); line-height:1.6; }
  .city-card .city-tag { display:inline-block; margin-top:10px; font-size:11px; font-weight:700; padding:2px 10px; border-radius:10px; background:rgba(255,65,3,.1); color:var(--orange); }
  @media(max-width:640px){ .compare-grid{grid-template-columns:1fr;} }
</style>
