<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* === NAV CSS === */
.container{max-width:1180px;margin:0 auto;padding:0 24px}
nav{position:sticky;top:0;z-index:1000;background:rgba(0,22,33,.98);box-shadow:0 2px 18px rgba(0,0,0,.28)}
.nav-inner{height:74px;display:flex;align-items:center;gap:18px}
.logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:900;margin-right:auto;text-decoration:none}
.logo-mark{width:40px;height:40px;background:var(--orange);border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:18px;color:#fff}
.logo span{color:var(--orange)}
.menu{display:flex;align-items:center;gap:3px;flex:1;justify-content:flex-end;white-space:nowrap}
.menu a{color:rgba(255,255,255,.72);font-size:13px;font-weight:650;padding:8px 8px;border-radius:9px;text-decoration:none;line-height:1}
.menu a:hover,.menu a.active{background:rgba(255,255,255,.1);color:#fff}
.menu .cta-mini{background:var(--orange);color:#fff;padding:11px 14px;margin-left:4px}
.menu .cta-mini:hover{background:#e03800}
.nav-phone{color:#fff;font-weight:800;opacity:.9;padding-left:10px;font-size:13px;text-decoration:none;white-space:nowrap}
.mobile-toggle{display:none;background:var(--orange);color:#fff;border:0;border-radius:9px;padding:10px 14px;font-weight:900;cursor:pointer;margin-left:auto;font-size:14px}
@media(max-width:960px){
  .nav-phone{display:none}
  .mobile-toggle{display:block}
  .menu{display:none;position:absolute;top:74px;left:0;right:0;background:#001621;padding:14px 18px;flex-direction:column;align-items:stretch;white-space:normal;box-shadow:0 18px 35px rgba(0,0,0,.25);z-index:999}
  .menu.open{display:flex}
  .menu a{font-size:15px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
  .menu .cta-mini{margin-left:0;text-align:center}
  .container{padding:0 18px}
}
/* === / NAV CSS === */

    

  :root{--orange:#FF4103;--dark:#001621;--dark2:#00243a;--gray-light:#f4f6f8;--gray-mid:#e2e8ed;--gray-text:#6b7a8a;--font:'Segoe UI',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--gray-light);color:var(--dark);}

  /* NAV */
  
  
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:40px;flex-shrink:0;}
  .logo-icon{width:38px;height:38px;background:var(--orange);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:17px;}
  .logo-text{color:#fff;font-weight:800;font-size:17px;letter-spacing:-.3px;}
  .logo-text span{color:var(--orange);}
  
  
  
  .nav-cta{background:var(--orange)!important;color:#fff!important;font-weight:700!important;padding:9px 20px!important;border-radius:8px!important;margin-left:8px!important;}
  .nav-cta:hover{background:#e03800!important;}
  .nav-phone{color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;margin-left:20px;white-space:nowrap;flex-shrink:0;}
  
  
  
  
  
  .mobile-
  
  
  
  
  @media(max-width:960px){.nav-phone{display:none;}}

  /* HERO */
  .blog-hero{background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%);padding:52px 24px 44px;text-align:center;position:relative;overflow:hidden;}
  .blog-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 50%,rgba(255,65,3,.12) 0%,transparent 55%);}
  .blog-hero-eyebrow{display:inline-block;background:rgba(255,65,3,.15);color:var(--orange);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:5px 16px;border-radius:20px;margin-bottom:16px;border:1px solid rgba(255,65,3,.3);position:relative;}
  .blog-hero h1{color:#fff;font-size:clamp(24px,4vw,40px);font-weight:900;margin-bottom:10px;position:relative;}
  .blog-hero p{color:rgba(255,255,255,.6);max-width:520px;margin:0 auto;font-size:15px;position:relative;}

  /* MAIN LAYOUT */
  .blog-main{max-width:1200px;margin:0 auto;padding:48px 24px 80px;display:grid;grid-template-columns:1fr 320px;gap:48px;align-items:start;}

  /* BLOG KARTLARI */
  .blog-grid{display:flex;flex-direction:column;gap:24px;}
  .blog-card{background:#fff;border:1px solid var(--gray-mid);border-radius:14px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:box-shadow .2s,transform .15s;}
  .blog-card:hover{box-shadow:0 10px 32px rgba(0,22,33,.12);transform:translateY(-3px);}
  .blog-card-img{height:160px;display:flex;align-items:center;justify-content:center;position:relative;}
  .blog-card-icon{font-size:52px;position:relative;z-index:1;}
  .blog-card-cat{position:absolute;top:14px;left:14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,.15);color:#fff;backdrop-filter:blur(4px);}
  .blog-card-body{padding:22px 24px 16px;flex:1;}
  .blog-card-meta{display:flex;gap:12px;margin-bottom:10px;font-size:12px;color:var(--gray-text);}
  .blog-card h2{font-size:17px;font-weight:800;line-height:1.35;margin-bottom:8px;color:var(--dark);}
  .blog-card p{font-size:13px;color:var(--gray-text);line-height:1.65;}
  .blog-card-footer{padding:14px 24px;border-top:1px solid var(--gray-light);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:var(--orange);transition:.2s;}
  .blog-card:hover .blog-card-footer{background:var(--orange);color:#fff;}

  /* SIDEBAR */
  .blog-sidebar{position:sticky;top:88px;display:flex;flex-direction:column;gap:20px;}
  .sidebar-box{background:#fff;border:1px solid var(--gray-mid);border-radius:14px;padding:22px;}
  .sidebar-box h3{font-size:14px;font-weight:800;margin-bottom:14px;color:var(--dark);}
  .sidebar-links{display:flex;flex-direction:column;gap:7px;}
  .sidebar-links a{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;background:var(--gray-light);text-decoration:none;color:var(--dark);font-size:13px;font-weight:500;transition:.2s;}
  .sidebar-links a:hover{background:rgba(255,65,3,.1);color:var(--orange);}
  .cta-box{background:var(--dark);border-radius:14px;padding:24px;}
  .cta-box h3{color:#fff;font-size:16px;font-weight:800;margin-bottom:8px;}
  .cta-box p{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:18px;line-height:1.6;}
  .btn-orange{display:block;background:var(--orange);color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:12px;border-radius:9px;text-align:center;margin-bottom:10px;transition:.2s;}
  .btn-orange:hover{background:#e03800;}
  .wa-link{display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:#fff;text-decoration:none;font-weight:600;font-size:13px;padding:11px;border-radius:9px;}

  /* FOOTER */
  footer{background:var(--dark);color:rgba(255,255,255,.55);padding:40px 24px 28px;}
  .footer-bottom{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;}

  /* WA FLOAT */
  .wa-float{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  .wa-float-btn{width:58px;height:58px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.45);text-decoration:none;transition:.2s;animation:wa-pulse 2.5s infinite;}
  .wa-float-btn:hover{transform:scale(1.1);}
  @keyframes wa-pulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.45);}50%{box-shadow:0 4px 28px rgba(37,211,102,.7),0 0 0 8px rgba(37,211,102,.12);}}
  .wa-float-tooltip{background:var(--dark);color:#fff;font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;white-space:nowrap;display:none;}
  .wa-float:hover .wa-float-tooltip{display:block;}

  /* STICKY BAR */
  #stickyBar{position:fixed;bottom:0;left:0;right:0;z-index:9998;background:var(--dark);border-top:2px solid var(--orange);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;transform:translateY(100%);transition:transform .4s ease;}
  #stickyBar .sb-text{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  #stickyBar .sb-title{color:#fff;font-size:13px;font-weight:700;}
  #stickyBar .sb-sub{color:rgba(255,255,255,.5);font-size:11px;}
  #stickyBar .sb-btns{display:flex;gap:8px;flex-shrink:0;}
  #stickyBar a{text-decoration:none;font-size:12px;font-weight:700;padding:8px 16px;border-radius:7px;}
  #stickyBar .sb-prog{background:rgba(255,255,255,.1);color:#fff;}
  #stickyBar .sb-wa{background:#25D366;color:#fff;}
  #stickyBar .sb-close{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:8px 10px;border-radius:7px;font-size:16px;}

  @media(max-width:860px){.blog-main{grid-template-columns:1fr;}.blog-sidebar{position:static;}}
  @media(max-width:480px){.blog-card-img{height:130px;}.blog-card-icon{font-size:42px;}}
</style>
