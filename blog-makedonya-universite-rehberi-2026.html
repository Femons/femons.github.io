<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* === NAV CSS === */
.container{max-width:1180px;margin:0 auto;padding:0 24px}
nav{position:sticky;top:0;z-index:1000;background:rgba(0,22,33,.98);box-shadow:0 2px 18px rgba(0,0,0,.28)}
.nav-inner{height:74px;display:flex;align-items:center;gap:18px}
.logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:900;margin-right:auto;text-decoration:none}
.logo-mark{width:40px;height:40px;background:var(--orange);border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:18px;color:#fff}
.logo span{color:var(--orange)}
.menu{display:flex;align-items:center;gap:3px;flex:1;justify-content:flex-end;white-space:nowrap}
.menu a{color:rgba(255,255,255,.72);font-size:13px;font-weight:650;padding:8px 8px;border-radius:9px;text-decoration:none;line-height:1}
.menu a:hover,.menu a.active{background:rgba(255,255,255,.1);color:#fff}
.menu .cta-mini{background:var(--orange);color:#fff;padding:11px 14px;margin-left:4px}
.menu .cta-mini:hover{background:#e03800}
.nav-phone{color:#fff;font-weight:800;opacity:.9;padding-left:10px;font-size:13px;text-decoration:none;white-space:nowrap}
.mobile-toggle{display:none;background:var(--orange);color:#fff;border:0;border-radius:9px;padding:10px 14px;font-weight:900;cursor:pointer;margin-left:auto;font-size:14px}
@media(max-width:960px){
  .nav-phone{display:none}
  .mobile-toggle{display:block}
  .menu{display:none;position:absolute;top:74px;left:0;right:0;background:#001621;padding:14px 18px;flex-direction:column;align-items:stretch;white-space:normal;box-shadow:0 18px 35px rgba(0,0,0,.25);z-index:999}
  .menu.open{display:flex}
  .menu a{font-size:15px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
  .menu .cta-mini{margin-left:0;text-align:center}
  .container{padding:0 18px}
}
/* === / NAV CSS === */

    

  :root{--orange:#FF4103;--dark:#001621;--dark2:#00243a;--white:#fff;--gray-light:#f4f6f8;--gray-mid:#e2e8ed;--gray-text:#6b7a8a;--font:'Segoe UI',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--gray-light);color:var(--dark);font-size:15px;line-height:1.6;}
  
  
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:36px;height:36px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;}
  .logo-text{color:#fff;font-weight:700;font-size:17px;}.logo-text span{color:var(--orange);}
  
  
  
  .nav-cta{background:var(--orange)!important;color:#fff!important;font-weight:600!important;padding:8px 18px!important;border-radius:8px!important;}
  
  
  
  
  
  .mobile-
  
  
  
  @media(max-width:900px){}
  .breadcrumb{background:#fff;padding:12px 24px;border-bottom:1px solid var(--gray-mid);}
  .breadcrumb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-text);}
  .breadcrumb a{color:var(--gray-text);text-decoration:none;}.breadcrumb a:hover{color:var(--orange);}
  .breadcrumb span{color:var(--orange);}
  .article-wrap{max-width:860px;margin:0 auto;padding:40px 24px 72px;display:grid;grid-template-columns:1fr 280px;gap:40px;align-items:start;}
  .article header{margin-bottom:28px;}
  .article-cat{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;background:rgba(255,65,3,.1);color:var(--orange);padding:4px 14px;border-radius:20px;margin-bottom:14px;}
  .article h1{font-size:clamp(22px,3vw,34px);font-weight:900;line-height:1.2;margin-bottom:12px;}
  .article-meta{display:flex;align-items:center;gap:14px;color:var(--gray-text);font-size:13px;margin-bottom:20px;}
  .article-lead{font-size:16px;color:var(--gray-text);line-height:1.8;padding:20px 24px;background:#fff;border-left:4px solid var(--orange);border-radius:0 10px 10px 0;margin-bottom:28px;}
  .article-body{background:#fff;border-radius:14px;padding:32px;border:1px solid var(--gray-mid);}
  .article-body h2{font-size:20px;font-weight:800;margin:28px 0 12px;color:var(--dark);padding-top:8px;border-top:1px solid var(--gray-light);}
  .article-body h2:first-child{border-top:none;padding-top:0;margin-top:0;}
  .article-body p{font-size:15px;color:var(--gray-text);line-height:1.85;margin-bottom:14px;}
  .article-body ul{margin:10px 0 16px 0;display:flex;flex-direction:column;gap:6px;}
  .article-body li{font-size:14px;color:var(--gray-text);line-height:1.7;padding:8px 14px;background:var(--gray-light);border-radius:6px;display:flex;align-items:center;gap:8px;}
  .article-body li::before{content:"✅";font-size:13px;flex-shrink:0;}
  .article-body strong{color:var(--dark);}
  .article-body a{color:var(--orange);font-weight:600;text-decoration:underline;text-decoration-style:dotted;}
  .answer-box{background:linear-gradient(135deg,rgba(255,65,3,.08),rgba(255,65,3,.04));border:1px solid rgba(255,65,3,.2);border-radius:10px;padding:20px 22px;margin:16px 0;}
  .answer-box .answer-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-bottom:6px;}
  .answer-box .answer-text{font-size:15px;font-weight:700;color:var(--dark);}
  .check-list{margin:10px 0 16px 0;display:flex;flex-direction:column;gap:6px;}
  .check-item{font-size:14px;color:var(--gray-text);padding:8px 14px;background:var(--gray-light);border-radius:6px;display:flex;align-items:center;gap:8px;}
  .article-cta{background:var(--dark);border-radius:12px;padding:24px;margin-top:32px;text-align:center;}
  .article-cta h3{color:#fff;font-size:18px;font-weight:800;margin-bottom:8px;}
  .article-cta p{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:16px;}
  .btn-orange{background:var(--orange);color:#fff;text-decoration:none!important;font-weight:700!important;font-size:14px;padding:11px 24px;border-radius:8px;display:inline-block;margin-right:8px;}
  .btn-wa{background:#25D366;color:#fff;text-decoration:none!important;font-weight:600!important;font-size:14px;padding:11px 18px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;}
  .sidebar{position:sticky;top:84px;display:flex;flex-direction:column;gap:16px;}
  .sidebar-card{background:#fff;border:1px solid var(--gray-mid);border-radius:12px;padding:20px;}
  .sidebar-card h3{font-size:14px;font-weight:800;margin-bottom:12px;}
  .sidebar-links{display:flex;flex-direction:column;gap:6px;}
  .sidebar-links a{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;background:var(--gray-light);text-decoration:none;color:var(--dark);font-size:13px;transition:.2s;}
  .sidebar-links a:hover{background:rgba(255,65,3,.1);color:var(--orange);}
  .cta-side{background:var(--dark);border-radius:12px;padding:20px;}
  .cta-side h3{color:#fff;font-size:14px;font-weight:800;margin-bottom:6px;}
  .cta-side p{color:rgba(255,255,255,.6);font-size:12px;margin-bottom:14px;}
  .cta-side .btn-orange{display:block;text-align:center;margin-bottom:8px;margin-right:0;}
  .wa-small{display:flex;align-items:center;justify-content:center;gap:6px;background:#25D366;color:#fff;text-decoration:none;font-weight:600;font-size:12px;padding:9px;border-radius:8px;}
  footer{background:var(--dark);color:rgba(255,255,255,.55);padding:40px 24px 24px;}
  .footer-bottom{max-width:1160px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;}
  .wa-float{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  .wa-float-btn{width:58px;height:58px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.45);text-decoration:none;transition:.2s;animation:wa-pulse 2.5s infinite;}
  .wa-float-btn:hover{transform:scale(1.1);}
  @keyframes wa-pulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.45);}50%{box-shadow:0 4px 28px rgba(37,211,102,.7),0 0 0 8px rgba(37,211,102,.12);}}
  .wa-float-tooltip{background:var(--dark);color:#fff;font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;white-space:nowrap;display:none;}
  .wa-float:hover .wa-float-tooltip{display:block;}
  @media(max-width:760px){.article-wrap{grid-template-columns:1fr;}.sidebar{position:static;}}
</style>
