<style>
    /* === NAV CSS === */
    nav{background:#001621;position:sticky;top:0;z-index:1000;box-shadow:0 2px 16px rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.06);}
    .nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;height:68px;display:flex;align-items:center;gap:0;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:40px;flex-shrink:0;}
    .logo-icon{width:38px;height:38px;background:#FF4103;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:17px;}
    .logo-text{color:#fff;font-weight:800;font-size:17px;letter-spacing:-.3px;}
    .logo-text span{color:#FF4103;}
    .nav-links{display:flex;align-items:center;gap:2px;list-style:none;flex:1;}
    .nav-links a{color:rgba(255,255,255,.65);text-decoration:none;font-size:14px;font-weight:500;padding:7px 13px;border-radius:7px;transition:color .18s,background .18s;white-space:nowrap;}
    .nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.09);}
    .nav-cta{background:#FF4103!important;color:#fff!important;font-weight:700!important;padding:9px 20px!important;border-radius:8px!important;margin-left:8px!important;}
    .nav-cta:hover{background:#e03800!important;}
    .nav-phone{color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;margin-left:20px;white-space:nowrap;flex-shrink:0;}
    .nav-phone:hover{color:#fff;}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;margin-left:12px;}
    .hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;transition:all .3s;}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .mobile-nav{display:none;position:fixed;top:68px;left:0;right:0;bottom:0;background:#001621;z-index:999;padding:24px 20px;flex-direction:column;gap:4px;overflow-y:auto;}
    .mobile-nav.open{display:flex;}
    .mobile-nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:17px;font-weight:600;padding:14px 18px;border-radius:10px;border-bottom:1px solid rgba(255,255,255,.05);transition:background .2s;}
    .mobile-nav a:hover{color:#fff;background:rgba(255,65,3,.15);}
    .mobile-nav .mob-cta{background:#FF4103!important;color:#fff!important;text-align:center;margin-top:12px;border-radius:10px!important;border-bottom:none!important;}
    @media(max-width:960px){.nav-links{display:none!important;}.nav-phone{display:none!important;}.hamburger{display:flex!important;}.nav-inner{padding:0 20px!important;}}
    /* === / NAV CSS === */

  :root{--orange:#FF4103;--dark:#001621;--dark2:#00243a;--white:#fff;--gray-light:#f4f6f8;--gray-mid:#e2e8ed;--gray-text:#6b7a8a;--font:'Segoe UI',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--gray-light);color:var(--dark);font-size:15px;line-height:1.6;}
  nav{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
  .nav-inner{max-width:1160px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:36px;height:36px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;}
  .logo-text{color:#fff;font-weight:700;font-size:17px;}.logo-text span{color:var(--orange);}
  .nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
  .nav-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;font-weight:500;padding:6px 12px;border-radius:6px;transition:.2s;}
  .nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.08);}
  .nav-cta{background:var(--orange)!important;color:#fff!important;font-weight:600!important;padding:8px 18px!important;border-radius:8px!important;}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;}
  .hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;transition:all .3s;}
  .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
  .hamburger.open span:nth-child(2){opacity:0;}
  .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
  .mobile-nav{display:none;position:fixed;top:64px;left:0;right:0;bottom:0;background:var(--dark);z-index:99;padding:24px;flex-direction:column;gap:8px;}
  .mobile-nav.open{display:flex;}
  .mobile-nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:18px;font-weight:600;padding:14px 16px;border-radius:10px;border-bottom:1px solid rgba(255,255,255,.06);}
  .mobile-nav .mob-cta{background:var(--orange);color:#fff!important;text-align:center;margin-top:8px;border-radius:10px!important;border-bottom:none!important;}
  @media(max-width:900px){.nav-links{display:none;}.hamburger{display:flex;}}
  #readProgress{position:fixed;top:0;left:0;height:3px;background:var(--orange);z-index:9999;width:0%;transition:width .1s;}
  .breadcrumb{background:#fff;padding:12px 24px;border-bottom:1px solid var(--gray-mid);}
  .breadcrumb-inner{max-width:1060px;margin:0 auto;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-text);}
  .breadcrumb a{color:var(--gray-text);text-decoration:none;}.breadcrumb a:hover{color:var(--orange);}
  .breadcrumb span{color:var(--orange);}
  .article-wrap{max-width:1060px;margin:0 auto;padding:40px 24px 72px;display:grid;grid-template-columns:1fr 300px;gap:40px;align-items:start;}
  .article header{margin-bottom:28px;}
  .article-cat{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;background:rgba(255,65,3,.1);color:var(--orange);padding:4px 14px;border-radius:20px;margin-bottom:14px;}
  .article h1{font-size:clamp(22px,3vw,34px);font-weight:900;line-height:1.25;margin-bottom:12px;}
  .article-meta{display:flex;align-items:center;flex-wrap:wrap;gap:14px;color:var(--gray-text);font-size:13px;margin-bottom:20px;}
  .article-lead{font-size:16px;color:var(--gray-text);line-height:1.85;padding:22px 26px;background:#fff;border-left:4px solid var(--orange);border-radius:0 12px 12px 0;margin-bottom:28px;}
  .article-body{background:#fff;border-radius:14px;padding:36px;border:1px solid var(--gray-mid);}
  .article-body h2{font-size:21px;font-weight:800;margin:36px 0 14px;color:var(--dark);padding-top:10px;border-top:2px solid var(--gray-light);}
  .article-body h2:first-child{border-top:none;padding-top:0;margin-top:0;}
  .article-body p{font-size:15px;color:var(--gray-text);line-height:1.9;margin-bottom:16px;}
  .article-body p:last-child{margin-bottom:0;}
  .hl{color:var(--orange);font-weight:700;}
  .article-body a.ilink{color:var(--orange);font-weight:600;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;}
  .article-body a.ilink:hover{color:#c73200;}
  .check-list{margin:12px 0 20px 0;display:flex;flex-direction:column;gap:7px;}
  .check-item{font-size:14px;color:var(--dark);padding:10px 16px;background:var(--gray-light);border-radius:8px;display:flex;align-items:flex-start;gap:10px;line-height:1.6;}
  .check-item .ci-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
  .highlight-box{background:linear-gradient(135deg,rgba(255,65,3,.07),rgba(255,65,3,.03));border:1px solid rgba(255,65,3,.2);border-radius:12px;padding:22px 24px;margin:24px 0;}
  .highlight-box .hb-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-bottom:8px;}
  .highlight-box p{font-size:15px;color:var(--dark);line-height:1.8;margin-bottom:0;}
  .quote-box{background:var(--dark);border-radius:12px;padding:26px 30px;margin:28px 0;}
  .quote-box p{color:rgba(255,255,255,.8);font-size:16px;line-height:1.85;font-style:italic;margin-bottom:0;}
  .inline-read{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--gray-mid);border-radius:10px;padding:14px 18px;margin:20px 0;text-decoration:none;color:inherit;transition:.2s;}
  .inline-read:hover{box-shadow:0 4px 14px rgba(0,22,33,.08);border-color:var(--orange);}
  .inline-read-icon{font-size:22px;flex-shrink:0;}
  .inline-read-text .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-bottom:3px;}
  .inline-read-text strong{font-size:14px;font-weight:700;color:var(--dark);display:block;}
  .inline-read-arrow{margin-left:auto;color:var(--orange);font-size:18px;flex-shrink:0;}
  .article-cta{background:var(--dark);border-radius:12px;padding:28px;margin-top:32px;text-align:center;}
  .article-cta h3{color:#fff;font-size:19px;font-weight:800;margin-bottom:8px;}
  .article-cta p{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:18px;}
  .btn-orange{background:var(--orange);color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:12px 26px;border-radius:8px;display:inline-block;margin-right:8px;transition:.2s;}
  .btn-orange:hover{background:#e03800;}
  .btn-wa{background:#25D366;color:#fff;text-decoration:none;font-weight:600;font-size:14px;padding:12px 20px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;}
  .sidebar{position:sticky;top:84px;display:flex;flex-direction:column;gap:16px;}
  .sidebar-card{background:#fff;border:1px solid var(--gray-mid);border-radius:12px;padding:20px;}
  .sidebar-card h3{font-size:14px;font-weight:800;margin-bottom:12px;}
  .sidebar-links{display:flex;flex-direction:column;gap:6px;}
  .sidebar-links a{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;background:var(--gray-light);text-decoration:none;color:var(--dark);font-size:13px;transition:.2s;}
  .sidebar-links a:hover{background:rgba(255,65,3,.1);color:var(--orange);}
  .cta-side{background:var(--dark);border-radius:12px;padding:20px;}
  .cta-side h3{color:#fff;font-size:14px;font-weight:800;margin-bottom:6px;}
  .cta-side p{color:rgba(255,255,255,.6);font-size:12px;margin-bottom:14px;}
  .cta-side .btn-orange{display:block;text-align:center;margin-bottom:8px;margin-right:0;}
  .wa-small{display:flex;align-items:center;justify-content:center;gap:6px;background:#25D366;color:#fff;text-decoration:none;font-weight:600;font-size:12px;padding:9px;border-radius:8px;}
  footer{background:var(--dark);color:rgba(255,255,255,.55);padding:40px 24px 24px;}
  .footer-bottom{max-width:1160px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;}
  .wa-float{position:fixed;bottom:28px;right:28px;z-index:9998;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  .wa-float-btn{width:58px;height:58px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.45);text-decoration:none;transition:.2s;animation:wa-pulse 2.5s infinite;}
  .wa-float-btn:hover{transform:scale(1.1);}
  @keyframes wa-pulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.45);}50%{box-shadow:0 4px 28px rgba(37,211,102,.7),0 0 0 8px rgba(37,211,102,.12);}}
  .wa-float-tooltip{background:var(--dark);color:#fff;font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;white-space:nowrap;display:none;}
  .wa-float:hover .wa-float-tooltip{display:block;}
  @media(max-width:760px){.article-wrap{grid-template-columns:1fr;}.sidebar{position:static;}}
</style>
